<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>

    <h1>Form to apply for Sigma Web Development Course</h1>

    <form action="" method="post">

        <div>
            <label for="username">Enter your username:</label>

            <input 
                type="text" 
                id="username" 
                name="username"
            >
        </div>

        <br>

        <div>
            <input 
                type="radio" 
                id="female" 
                name="gender" 
                value="female"
            >

            <label for="female">Female</label>
        </div>

    </form>

</body>
</html>
