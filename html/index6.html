<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flesbox</title>
    <style>
        .container{
            border: 2px solid red;
            display: flex;
            height: 80vh;
           /* justify-content: center; */
            align-items: center;
           /* flex-direction: column; */ 
           flex-wrap: wrap;
           align-content: center;
           align-content: start;
           flex-flow: row row-reverse;
        /* flex-direction and flex-wrap dono ko 1 sath likh sakte hai*/
         /* there is no justify items in flexbox; */
        /* display flex box cheexo ko left to right shift karta hai */ 
        gap: 30px;
        flex-flow: row row-reverse;
        flex-flow: row wrap;
         /* gap: 30px;
        row-gap: 30px;
        column-gap: 40px;
        gap: 50px 10px; */
        }
        .item{
            /* flex-grow: 1; */
            height: 92px;
            width: 92px;
            border: 2px solid rgb(211, 26, 26);
            margin: 4px;
            background-color: blueviolet;
        }

        .order-1{
            order: 1;
        }
        .order-2{
            order: 2;
        }
        .order-3{
            order: 3;
        }
    .item{
        /* flex-grow: 2; */
        flex-shrink: 2;
    }
    </style>
</head>
<body>
    
    <main>
        <div class="container">
            <div class="item order-1">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item order-1">4</div>
            <div class="item">5</div>
            <div class="item">6</div>
            <div class="item">7</div>
            <div class="item">8</div>
            <div class="item">9</div>
            <div class="item">10</div>
            <div class="item order-1">66</div>
            <div class="item">12</div>
            <div class="item">13</div>
            <div class="item">14</div>
            <div class="item">15</div>
            <div class="item">16</div>
            <div class="item">17</div>
            <div class="item">18</div>
            <div class="item">19</div>
            <div class="item">20</div>
            <div class="item">21</div>
            <div class="item">22</div>
            <div class="item">23</div>
            <div class="item">24</div>
            <div class="item">25</div>
        </div>
    </main>
</body>
</html>
