        .box2 {
         background-color: azure;
        }

        .box3 {
            background-color: antiquewhite;
            position: fixed;
            bottom: 0px;

        }
        .box4 {

        }

        .box {
            height: 433px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
            border: 2px solid black;
        }

        .parent {
            padding: 43px;
            margin: 34px;
            border: 3px solid purple;
            */transform, filter, or perspective properties can also make an element appear as position */
           */ position: relative; */
           transform: translate: (0);
           filter: invert();
           perspective: 0;
        }
    </style>

        <div class="box box1"></div>
